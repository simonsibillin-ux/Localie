<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Localie</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0d2d6a;
      --blue: #1a6bdf;
      --blue-light: #4a9eff;
      --dark: #0a1628;
      --gold: #f5a623;
      --ice: #f0f8ff;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #fff;
      color: var(--navy);
      min-height: 100vh;
    }
    .login-page {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }
    .login-panel {
      background: linear-gradient(135deg, var(--navy) 0%, var(--dark) 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
      color: #fff;
    }
    .login-panel-inner { max-width: 400px; text-align: center; }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; margin-bottom: 40px; justify-content: center; }
    .logo img { height: 40px; width: auto; }
    .logo-text { font-family: 'DM Serif Display', serif; font-size: 24px; color: #fff; }
    .logo-text span { color: var(--blue-light); }
    .panel-tagline { font-size: 20px; font-family: 'DM Serif Display', serif; margin-bottom: 40px; color: #fff; }
    .trust-stats {
      display: flex;
      gap: 30px;
      justify-content: center;
      margin-top: 40px;
    }
    .stat-item { text-align: center; }
    .stat-num { font-size: 28px; font-family: 'DM Serif Display', serif; color: var(--gold); }
    .stat-label { font-size: 12px; color: rgba(255,255,255,0.6); text-transform: uppercase; margin-top: 4px; }

    .form-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
      background: #fff;
    }
    .form-box { width: 100%; max-width: 380px; }
    .form-title { font-family: 'DM Serif Display', serif; font-size: 32px; margin-bottom: 12px; color: var(--navy); }
    .form-sub { font-size: 14px; color: #999; margin-bottom: 32px; }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 20px;
    }
    .form-label { font-size: 12px; font-weight: 600; color: #666; text-transform: uppercase; }
    .form-input {
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(26,107,223,0.1);
    }

    .forgot-link {
      text-align: right;
      font-size: 12px;
      color: var(--blue);
      text-decoration: none;
      margin: 16px 0 24px;
      cursor: pointer;
    }
    .forgot-link:hover { text-decoration: underline; }

    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-primary {
      background: var(--blue);
      color: #fff;
      width: 100%;
    }
    .btn-primary:hover { background: var(--navy); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: #ccc;
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #ddd;
    }

    .google-btn {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      color: var(--navy);
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .google-btn:hover { background: #f5f5f5; }

    .bottom-links {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-top: 24px;
    }
    .bottom-links a {
      color: var(--blue);
      text-decoration: none;
      font-weight: 500;
    }
    .bottom-links a:hover { text-decoration: underline; }

    .error { color: #dc2626; font-size: 12px; margin-top: 4px; }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--dark);
      color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 1000;
      display: none;
    }
    .toast.show { display: block; }

    @media (max-width: 900px) {
      .login-page { grid-template-columns: 1fr; }
      .login-panel { display: none; }
      .form-panel { padding: 40px 20px; }
    }
  </style>
</head>
<body>

<div class="login-page">
  <!-- Left Panel -->
  <div class="login-panel">
    <div class="login-panel-inner">
      <a href="index.html" class="logo">
        <img src="images/logo.png" alt="Localie">
      </a>
      <h1 class="panel-tagline">Local services you can trust</h1>
      <p style="font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.6; margin-bottom: 40px;">
        Every provider on Localie is individually verified — ABN checked, insured, and personally approved by our team.
      </p>
      <div class="trust-stats">
        <div class="stat-item">
          <div class="stat-num">2,847</div>
          <div class="stat-label">Active Users</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">100%</div>
          <div class="stat-label">Verified</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="form-panel">
    <div class="form-box">
      <h2 class="form-title">Sign in</h2>
      <p class="form-sub">Welcome back to Localie</p>

      <button class="google-btn">
        <i class="ti ti-brand-google"></i>
        Continue with Google
      </button>

      <div class="divider">or</div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input type="email" class="form-input" id="email" placeholder="you@example.com" required />
          <div class="error" id="emailError"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="password" placeholder="••••••••" required />
          <div class="error" id="passwordError"></div>
        </div>

        <a class="forgot-link" id="forgotLink">Forgot password?</a>

        <button type="submit" class="btn btn-primary" id="signInBtn">Sign in</button>

        <div class="error" id="formError" style="text-align: center; margin-top: 16px;"></div>
      </form>

      <div class="bottom-links">
        New to Localie? <a href="signup.html">Create account</a><br><br>
        <a href="apply.html">Apply as a provider</a>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
  import { signIn, getSession, redirectToDashboard } from './js/auth.js';
  import sb from './js/supabase.js';

  // Check if already logged in
  (async () => {
    const session = await getSession();
    if (session) await redirectToDashboard();
  })();

  const form = document.getElementById('loginForm');
  const signInBtn = document.getElementById('signInBtn');
  const formError = document.getElementById('formError');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    formError.textContent = '';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      formError.textContent = 'Please fill in all fields';
      return;
    }

    signInBtn.disabled = true;
    signInBtn.textContent = 'Signing in...';

    try {
      await signIn(email, password);
      showToast('Signed in successfully', 'success');
      await redirectToDashboard();
    } catch (err) {
      formError.textContent = err.message || 'Sign in failed';
    } finally {
      signInBtn.disabled = false;
      signInBtn.textContent = 'Sign in';
    }
  });

  document.getElementById('googleBtn')?.addEventListener('click', async () => {
    try {
      await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/dashboard-customer.html' }
      });
    } catch (err) {
      formError.textContent = err.message;
    }
  });

  document.getElementById('forgotLink').addEventListener('click', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!email) {
      document.getElementById('emailError').textContent = 'Please enter your email';
      return;
    }
    try {
      await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/reset-password.html'
      });
      showToast('Password reset link sent to your email', 'success');
    } catch (err) {
      showToast(err.message, 'error');
    }
  });

  function showToast(msg, type) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.background = type === 'error' ? '#dc2626' : '#059669';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }
</script>

</body>
</html>
